appId: net.anamnesis.dashboard
productName: Anamnesis
directories:
  output: dist
  buildResources: build
# Bundle the Electron entry and the standalone server (with its copied assets).
files:
  - dist-electron/**
  - ".next/standalone/**"
  - ".next/static/**"
  - public/**
# Ship plain files (no asar). The standalone server is spawned as a child Node
# process and loads a native .node from .next/standalone/node_modules; asar
# packing makes that path fragile, so disable it. afterPack then overwrites the
# real .node files with the Electron-ABI build.
asar: false
afterPack: scripts/afterPack.cjs
linux:
  maintainer: Oscar Devos <oscar.devos02@gmail.com>
  target:
    - AppImage
    - deb
  category: Utility
mac:
  target:
    - dmg
  identity: null # unsigned for now
win:
  target:
    - nsis
