name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: server (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Create virtualenv
        run: uv venv --python ${{ matrix.python-version }}

      - name: Install package and dev tools
        run: uv pip install -e ".[mcp,dev]"

      # The git-sync tests run real `git` and create commits, so a committer
      # identity must exist on the runner.
      - name: Configure git identity (sync tests)
        run: |
          git config --global user.email "ci@anamnesis.invalid"
          git config --global user.name "anamnesis ci"

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Format check (ruff)
        run: uv run ruff format --check src tests

      - name: Type check (mypy)
        run: uv run mypy src

      - name: Tests (pytest)
        run: uv run pytest -q
