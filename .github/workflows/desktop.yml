name: desktop build
on:
  workflow_dispatch:
  push:
    tags:
      - "dashboard-v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run desktop:build
      - uses: actions/upload-artifact@v4
        with:
          name: anamnesis-desktop-${{ matrix.os }}
          path: |
            dashboard/dist/*.AppImage
            dashboard/dist/*.deb
            dashboard/dist/*.dmg
            dashboard/dist/*.exe
          if-no-files-found: ignore
